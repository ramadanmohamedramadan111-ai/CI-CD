name: My First Pipeline

env:
  CREATE_ISSUE_API: ${{ vars.CREATE_ISSUE_API }}

on:
  push:
    branches:
      - master

permissions:
  issues: write

jobs:
  hello:
    runs-on: ubuntu-latest

    steps:
      - name: Print Message
        run: echo "CI/CD Working"

      - name: Simulate Failure
        run: |
          echo "Simulating an error..."
          exit 1

      - name: Create GitHub Issue on Failure
        if: failure()
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            $CREATE_ISSUE_API \
            -d '{"title":"Pipeline Failed","body":"Workflow failed.","labels":["bug"]}'