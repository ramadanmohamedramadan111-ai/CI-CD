name: My First Pipeline

on:
  push:
    branches:
      - master

env:
  CREATE_ISSUE_API: ${{ vars.CREATE_ISSUE_API }}

permissions:
  issues: write

jobs:

  # =========================
  # BUILD JOB
  # =========================
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Build Step
        run: |
          echo "Building project..."
          echo "Build Success"

  # =========================
  # TEST JOB
  # =========================
  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Test Step
        run: |
          echo "Running Tests..."

          # نجرب failure
          exit 1

      - name: Create GitHub Issue on Failure
        # if: failure()
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            $CREATE_ISSUE_API \
            -d '{"title":"Pipeline Failed","body":"Tests failed.","labels":["bug"]}'

  # =========================
  # DEPLOY JOB
  # =========================
  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Step
        run: |
          echo "Deploying Application..."